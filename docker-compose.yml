services:
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: hestia-mqtt
    restart: unless-stopped
    # These create the privileged "backend" MQTT user. Devices get their own
    # per-device users via mqtt/provision-device.sh. Override via root .env/shell.
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-hestiadev}
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
    entrypoint: ["/bin/sh", "/mosquitto/entrypoint.sh"]

  backend:
    build: ./backend
    container_name: hestia-backend
    restart: unless-stopped
    # Most config (Supabase, VAPID, CORS, MQTT_BROKER_URL) comes from backend/.env.
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
      # Broker creds come from the SAME compose-level env that seeds the broker
      # (root .env / shell), so a single MQTT_PASSWORD drives both ends and they
      # can't drift. This overrides MQTT_USERNAME/MQTT_PASSWORD from backend/.env
      # for the docker run. Default stays `backend`/`hestiadev` for zero-config dev.
      MQTT_USERNAME: ${MQTT_USERNAME:-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-hestiadev}
    # Published on host loopback only. The Cloudflare quick tunnel (run on the
    # host) reaches it at localhost:3000 and gives it a temporary public HTTPS
    # URL — so 3000 is NOT exposed to the internet and needs no firewall rule.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mqtt

volumes:
  mqtt-data:
  mqtt-log:
