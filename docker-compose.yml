services:
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: hestia-mqtt
    restart: unless-stopped
    # Credentials default to hestia/hestiadev; override via root .env or shell.
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-hestia}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-hestiadev}
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
    entrypoint: ["/bin/sh", "/mosquitto/entrypoint.sh"]

  backend:
    build: ./backend
    container_name: hestia-backend
    restart: unless-stopped
    # Secrets (Supabase, VAPID) come from backend/.env on the host.
    env_file:
      - ./backend/.env
    environment:
      # Reach the broker over the compose network by service name, not localhost.
      MQTT_BROKER_URL: mqtt://mqtt:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-hestia}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-hestiadev}
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - mqtt

volumes:
  mqtt-data:
  mqtt-log:
