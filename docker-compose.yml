services:
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: hestia-mqtt
    restart: unless-stopped
    # These create the privileged "backend" MQTT user. Devices get their own
    # per-device users via mqtt/provision-device.sh. Override via root .env/shell.
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-hestiadev}
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
    entrypoint: ["/bin/sh", "/mosquitto/entrypoint.sh"]

  backend:
    build: ./backend
    container_name: hestia-backend
    restart: unless-stopped
    # All config (Supabase, VAPID, and MQTT_BROKER_URL → the Vultr server) comes
    # from backend/.env, so the backend connects to the same server broker as the
    # firmware and frontend — no local-vs-server split.
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
    # Not published to the host: the backend is reached only through Caddy
    # (api.hestia.my). Caddy talks to it internally as `backend:3000`.
    expose:
      - "3000"
    depends_on:
      - mqtt

  # Reverse proxy: terminates HTTPS for api.hestia.my and forwards to backend.
  # Auto-provisions + renews a Let's Encrypt cert (needs ports 80/443 open and
  # the api.hestia.my DNS record pointing here). Config: ./caddy/Caddyfile.
  caddy:
    image: caddy:2
    container_name: hestia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  mqtt-data:
  mqtt-log:
  caddy-data:
  caddy-config:
