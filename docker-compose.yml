services:
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: hestia-mqtt
    restart: unless-stopped
    # These create the privileged "backend" MQTT user. Devices get their own
    # per-device users via mqtt/provision-device.sh. Override via root .env/shell.
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-hestiadev}
      # Shared account every device authenticates with (formality/gate, not
      # isolation). Devices set the same values in firmware/.env.
      DEVICE_MQTT_USERNAME: ${DEVICE_MQTT_USERNAME:-device}
      DEVICE_MQTT_PASSWORD: ${DEVICE_MQTT_PASSWORD:-hestiadevice}
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
    entrypoint: ["/bin/sh", "/mosquitto/entrypoint.sh"]

  backend:
    build: ./backend
    container_name: hestia-backend
    restart: unless-stopped
    # All config (Supabase, VAPID, and MQTT_BROKER_URL → the Vultr server) comes
    # from backend/.env, so the backend connects to the same server broker as the
    # firmware and frontend — no local-vs-server split.
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
    # Published on loopback only: HTTPS for api.hestia.my is handled by the
    # Cloudflare Tunnel (cloudflared runs on the host and forwards to
    # http://localhost:3000), so the port never needs to face the public net.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mqtt

volumes:
  mqtt-data:
  mqtt-log:
