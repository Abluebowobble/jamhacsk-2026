    C 226 362, 196 332, 194 280
    C 192 240, 214 206, 246 176
    C 250 198, 262 202, 266 190
    C 270 178, 262 164, 256 150 Z
    M 256 228 a 15 15 0 1 0 0.01 0 Z
    M 241 330 L 245 270 C 246 261 250 258 256 258 C 262 258 266 261 267 270 L 271 330 Z
  "/>
</svg>
