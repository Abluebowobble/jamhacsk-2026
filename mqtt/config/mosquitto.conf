# Hestia MQTT broker config (dev). Password-protected, plain TCP only.

# Accept connections from outside the container (not just loopback).
listener 1883 0.0.0.0

# Require credentials — no anonymous clients.
allow_anonymous false
password_file /mosquitto/data/passwd

# Per-topic ACLs are intentionally DISABLED. The backend (Supabase + RLS) governs
# what each user can see, so the broker only needs to gate connections by
# password — any authenticated client may pub/sub any hestia/ topic. (With an
# acl_file set, a user lacking an exact matching block is denied EVERYTHING, which
# is the failure we're avoiding.) To re-enable isolation, uncomment the line below
# and restore the ACL-building logic in entrypoint.sh.
# acl_file /mosquitto/data/aclfile

# Persist retained messages / subscriptions across restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker logs hestia-mqtt` shows broker activity.
log_dest stdout
