# Hestia MQTT broker config (dev). Password-protected, plain TCP only.

# Accept connections from outside the container (not just loopback).
listener 1883 0.0.0.0

# Require credentials — no anonymous clients.
allow_anonymous false
password_file /mosquitto/data/passwd

# Per-user topic permissions. The backend gets full access; each device user is
# scoped to its own household/device subtree (entries added by provisioning).
# Lives in the data volume so provisioning can append + reload without a rebuild.
acl_file /mosquitto/data/aclfile

# Persist retained messages / subscriptions across restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker logs hestia-mqtt` shows broker activity.
log_dest stdout
