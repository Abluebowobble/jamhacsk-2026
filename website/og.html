<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Render target for the 1200x630 social card — screenshot .og */
    html, body { margin: 0; background: #e9edf2; }
    .og {
      width: 1200px; height: 630px; box-sizing: border-box;
      display: grid; grid-template-columns: 1.04fr 0.96fr; align-items: center;
      gap: 56px; padding: 72px; overflow: hidden; position: relative;
      background: var(--color-bg);
    }
    .og__copy { position: relative; z-index: 1; }
    .og__brand { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 30px; }
    .og__brand svg { width: 40px; height: 40px; color: var(--color-primary); }
    .og__brand span { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--color-ink); }
    .og__title {
      font-size: 62px; line-height: 1.04; letter-spacing: -0.03em; font-weight: 600;
      color: var(--color-ink); max-width: 13ch; margin: 0;
    }
    .og__sub {
      margin-top: 22px; font-size: 23px; line-height: 1.45; color: var(--color-ink-muted); max-width: 30ch;
    }
    .og__panel {
      position: relative; z-index: 1; justify-self: end; width: 100%; max-width: 430px;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 26px; box-shadow: var(--shadow-pop);
      display: flex; flex-direction: column; gap: 20px;
    }
    .og__phead { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
    .og__pdev { font-size: 22px; font-weight: 600; color: var(--color-ink); letter-spacing: -0.02em; }
    .og__plabel { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-ink-muted); display: block; margin-bottom: 4px; }
    .og__tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .og__tile { padding: 16px; background: var(--color-surface-sunken); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
    .og__tbody { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .og__ring { position: relative; width: 46px; height: 46px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .og__ring::before { content: ""; position: absolute; inset: 0; border-radius: 9999px; border: 1px solid currentColor; opacity: 0.22; }
    .og__ring::after { content: ""; position: absolute; inset: 6px; border-radius: 9999px; border: 1px solid currentColor; background: currentColor; opacity: 0.10; }
    .og__ring svg { position: relative; width: 22px; height: 22px; }
    .og__ring--primary { color: var(--color-primary); }
    .og__ring--success { color: var(--color-success); }
    .og__val { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: var(--color-ink); }
    .og__status { border-top: 1px solid var(--color-border); padding-top: 16px; }
    .og .pill { font-size: 14px; }
    .og .pill svg { width: 15px; height: 15px; }
  </style>
</head>
<body>
  <div class="og grid-bg">
    <div class="og__copy">
      <div class="og__brand">
        <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="16" cy="16" r="9.4" stroke="currentColor" stroke-width="1" opacity="0.28"/>
          <g transform="translate(8.08 8.1) scale(0.66)">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" fill="currentColor"/>
          </g>
        </svg>
        <span>Hestia</span>
      </div>
      <h1 class="og__title">The stove that watches itself.</h1>
      <p class="og__sub">It warns when a lit stove is left unattended — and shuts it off automatically if no one returns. Decided on the device, not the cloud.</p>
    </div>

    <div class="og__panel">
      <div class="og__phead">
        <div>
          <span class="og__plabel">Device</span>
          <div class="og__pdev">Kitchen Stove</div>
        </div>
        <span class="pill pill--success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
          Online
        </span>
      </div>
      <div class="og__tiles">
        <div class="og__tile">
          <span class="og__plabel">Stove</span>
          <div class="og__tbody">
            <span class="og__ring og__ring--primary"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span>
            <span class="og__val">On</span>
          </div>
        </div>
        <div class="og__tile">
          <span class="og__plabel">Presence</span>
          <div class="og__tbody">
            <span class="og__ring og__ring--success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></span>
            <span class="og__val">Detected</span>
          </div>
        </div>
      </div>
      <div class="og__status">
        <span class="pill pill--success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
          Attended — all clear
        </span>
      </div>
    </div>
  </div>
</body>
</html>
